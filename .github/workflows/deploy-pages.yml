name: Deploy website to GitHub Pages

# Publishes the static download/help site under website/ to GitHub Pages.
# Runs on any push to main that touches the site (or this workflow), and can
# be triggered manually. The site itself pulls the latest release dynamically
# via the GitHub API, so it never needs a redeploy just because a new version
# shipped — only content/layout changes require a run.

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages on the repo automatically if it isn't already, so the
          # deploy doesn't fail with "Get Pages site failed / Not Found" on the
          # first run. Requires the pages: write permission granted above.
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
