name: Build installer

# Builds the Windows x64 installer end-to-end on a clean runner:
#   1. HebcalNative.dll from Go (CGO)
#   2. The WinUI 3 app (Visual Studio MSBuild publish)
#   3. The Inno Setup installer (with the Windows App Runtime bundled)
#
# Reuses the repo's existing scripts (HebcalNative/build-hebcal-dll.bat and
# Installer/HebDate.iss) so the result matches a local build.bat run.
#
# Runs on version tags (v*) to attach the installer to a GitHub Release, and
# can be triggered manually (workflow_dispatch) to test the build without tagging.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # needed to create the Release on tag builds

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # On a tag push (v1.9.0) this exposes VERSION=1.9.0 to later steps, which
      # then flows into the .NET assembly version and the Inno Setup AppVersion.
      # On a manual run there's no tag, so VERSION stays empty and the versions
      # already committed in the .csproj / HebDate.iss are used as-is.
      - name: Determine version from tag
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $ver = $env:GITHUB_REF_NAME -replace '^v',''
            if ($ver -notmatch '^[0-9]+(\.[0-9]+){1,3}$') {
              Write-Host "Tag '$($env:GITHUB_REF_NAME)' is not a version like v1.2.3 - aborting."
              exit 1
            }
            Write-Host "Version from tag: $ver"
          } else {
            $ver = ''
            Write-Host "Manual run (no tag) - keeping the versions already in the repo files."
          }
          "VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # On tag builds, write the version into the source files that carry it
      # literally. Encoding (UTF-8, no BOM) is preserved so the Hebrew text in
      # these files is not corrupted. This stamps the version into THIS build
      # only - it does not commit the changed files back to the repo.
      - name: Stamp version into source files
        if: env.VERSION != ''
        shell: pwsh
        run: |
          $base = (Get-Location).Path
          $ver  = $env:VERSION
          # 4-part form for the Win32 manifest (e.g. 1.9.0 -> 1.9.0.0)
          $p = $ver.Split('.'); while ($p.Count -lt 4) { $p += '0' }
          $ver4 = ($p[0..3]) -join '.'

          function Stamp($rel, $pattern, $replacement) {
            $path  = Join-Path $base $rel
            $bytes = [System.IO.File]::ReadAllBytes($path)
            $bom   = ($bytes.Length -ge 3 -and $bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF)
            $text  = [System.IO.File]::ReadAllText($path)
            $new   = [regex]::Replace($text, $pattern, $replacement)
            if ($new -eq $text) { Write-Host "WARNING: no version match in $rel" }
            [System.IO.File]::WriteAllText($path, $new, (New-Object System.Text.UTF8Encoding($bom)))
            Write-Host "Stamped $rel"
          }

          # Current committed version - used to find the literal fallback in the C#.
          $old = [regex]::Match(
                   (Get-Content (Join-Path $base 'ItimHebrewCalendar.csproj') -Raw),
                   '<Version>([^<]+)</Version>').Groups[1].Value

          # 1) .csproj : <Version>1.8.0</Version>
          Stamp 'ItimHebrewCalendar.csproj' '<Version>[^<]*</Version>' "<Version>$ver</Version>"

          # 2) app.manifest : <assemblyIdentity version="1.8.0.0" .../>
          Stamp 'app.manifest' '(<assemblyIdentity\b[^>]*\bversion=")[^"]*(")' "`${1}$ver4`${2}"

          # 3) SettingsWindow.xaml.cs : fallback literal "גרסה 1.8.0" (2 places).
          #    Anchored so it only matches the standalone old version, not a
          #    substring of a longer number.
          if ($old) {
            Stamp 'Windows/SettingsWindow.xaml.cs' "(?<![\d.])$([regex]::Escape($old))(?![\d.])" $ver
          } else {
            Write-Host "Could not read <Version> from csproj; skipping the C# fallback."
          }

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: HebcalNative/lib/go.mod
          cache-dependency-path: HebcalNative/lib/go.sum

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Ensure MinGW gcc (CGO compiler)
        shell: pwsh
        run: |
          if (-not (Get-Command gcc -ErrorAction SilentlyContinue)) {
            choco install mingw -y --no-progress
          }
          gcc --version

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      # 1) Native Go DLL -> Resources\HebcalNative.dll
      - name: Build HebcalNative.dll
        shell: cmd
        run: call HebcalNative\build-hebcal-dll.bat x64

      # 2) Build the WinUI 3 app the same way Visual Studio does locally: a plain
      #    Release build for x64 with NO RuntimeIdentifier, so the output lands
      #    directly in ...\net8.0-windows10.0.19041.0\ (where HebDate.iss reads
      #    from). Passing -r win-x64 would nest it under a win-x64\ subfolder.
      #    Load the VS Developer environment first so WinAppSDK's XAML/PRI tasks
      #    actually run (a bare msbuild "succeeds" but silently skips them).
      - name: Build app (x64)
        shell: cmd
        run: |
          for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -prerelease -property installationPath`) do set "VSPATH=%%i"
          if not defined VSPATH ( echo [error] Visual Studio not found & exit /b 1 )
          call "%VSPATH%\Common7\Tools\VsDevCmd.bat" -arch=x64 -no_logo
          msbuild ItimHebrewCalendar.csproj -restore -t:Build -p:Configuration=Release -p:Platform=x64 -v:m

      # MSBuild's output layout varies between runs: sometimes the app lands flat
      # in ...\net8.0-windows10.0.19041.0\ (with a runtimes\ folder), sometimes
      # nested one level down (e.g. under win-x64\). HebDate.iss reads it flat from
      # ...\net8.0-windows10.0.19041.0\, so locate the exe wherever it is and make
      # sure it ends up flat there. No repo changes needed.
      - name: Normalize build output for the installer
        shell: pwsh
        run: |
          $root = "bin\x64\Release\net8.0-windows10.0.19041.0"
          if (Test-Path (Join-Path $root "ItimHebrewCalendar.exe")) {
            Write-Host "App already flat in $root"
          } else {
            # Find the exe anywhere under $root, ignoring any publish\ copy.
            $exe = Get-ChildItem -Path $root -Recurse -Filter "ItimHebrewCalendar.exe" -File |
                   Where-Object { $_.FullName -notmatch '\\publish\\' } |
                   Select-Object -First 1
            if (-not $exe) {
              Write-Host "ItimHebrewCalendar.exe not found under $root. Actual bin tree:"
              Get-ChildItem -Recurse bin | Select-Object -ExpandProperty FullName
              exit 1
            }
            Write-Host "Flattening $($exe.Directory.FullName) -> $root"
            Get-ChildItem -Force $exe.Directory.FullName | Move-Item -Destination $root -Force
          }
          # Drop non-runtime folders so they don't bloat the installer.
          # Keep runtimes\ - it holds the native WinAppSDK/WebView2 DLLs.
          Remove-Item -Recurse -Force `
            (Join-Path $root "publish"),(Join-Path $root "website"),(Join-Path $root "win-x64") `
            -ErrorAction SilentlyContinue
          if (-not (Test-Path (Join-Path $root "ItimHebrewCalendar.exe"))) {
            Write-Host "Normalize failed - exe missing from $root"; exit 1
          }
          Write-Host "OK: app ready in $root"

      # ---------------------------------------------------------------------
      #  CODE SIGNING slots in here once SignPath / OSSign approves the project:
      #  sign Resources\HebcalNative.dll and the published ItimHebrewCalendar.exe
      #  BEFORE the installer is built, then sign the installer after step 3.
      # ---------------------------------------------------------------------

      # 3) The installer bundles the Windows App Runtime, so ISCC needs that file
      #    present at compile time. Download it into Installer\Redist first.
      - name: Fetch Windows App Runtime
        shell: pwsh
        run: |
          $dst = "Installer\Redist"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          $ProgressPreference = "SilentlyContinue"
          Invoke-WebRequest "https://aka.ms/windowsappsdk/1.7/latest/windowsappruntimeinstall-x64.exe" `
            -OutFile "$dst\WindowsAppRuntimeInstall-x64.exe" -UseBasicParsing

      - name: Build installer (Inno Setup)
        shell: cmd
        run: |
          cd Installer
          set "VERARG="
          if not "%VERSION%"=="" set "VERARG=/DAppVersion=%VERSION%"
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" %VERARG% HebDate.iss

      # --- Sign the finished installer here once signing is set up. ---

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ItimHebrewCalendar-Setup
          path: Release\ItimHebrewCalendar-Setup-*.exe
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $exe = Get-ChildItem Release\ItimHebrewCalendar-Setup-*.exe | Select-Object -First 1
          gh release create $env:GITHUB_REF_NAME $exe.FullName `
            --title "עיתים $env:GITHUB_REF_NAME" `
            --notes "מתקין אוטומטי שנבנה מתגית זו." `
            --draft